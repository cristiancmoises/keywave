services:
  keywave:
    build: .
    container_name: keywave
    restart: unless-stopped
    ports:
      - "0.0.0.0:5128:5000"
    environment:
      - PYTHONUNBUFFERED=1
      # ── Optional configuration (uncomment as needed) ───────────────────────
      # - KEYWAVE_ALLOWED_ORIGINS=https://keywave.example.com   # CORS allowlist (default: *)
      # - STUN_URLS=stun:stun.l.google.com:19302
      # --- TURN is REQUIRED for reliable phone-to-phone calls over cellular/CGNAT ---
      # - TURN_URLS=turn:turn.example.com:3478?transport=udp,turns:turn.example.com:443?transport=tcp
      #   (a) static long-term credentials:
      # - TURN_USERNAME=keywave
      # - TURN_CREDENTIAL=change-me
      #   (b) OR coturn time-limited REST credentials (preferred):
      # - TURN_STATIC_SECRET=your-coturn-shared-secret
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # ── Hardening ────────────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    pids_limit: 256
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Behind a reverse proxy (e.g. Nginx Proxy Manager) ────────────────────────
# Point the proxy at http://keywave:5000 and enable WebSocket upgrade. In NPM's
# Advanced tab:
#   proxy_http_version 1.1;
#   proxy_set_header Upgrade $http_upgrade;
#   proxy_set_header Connection "upgrade";
#   proxy_read_timeout 86400;
# A valid TLS certificate on the proxy gives the secure context phones require.
